services:
  - type: web
    name: task-tracker-api
    runtime: node
    repo: https://github.com/kunemaithilee/Task-Tracker-web-application
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
